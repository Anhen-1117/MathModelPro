<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- 背景 -->
    <radialGradient id="bg" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0B1120"/>
    </radialGradient>
    <!-- 三个重叠圆形各自的渐变 -->
    <radialGradient id="cyanGlow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </radialGradient>
    <radialGradient id="purpleGlow" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#bg)"/>

  <!--
    三个重叠圆形 → 象征：
    - 多智能体协作（3 个圆 = 建模/编程/论文，中心重叠 = 协调器）
    - 集合论（数学基础）
    - Figma 式的现代多彩重叠美学
  -->
  <!-- 左上：青色圆 -->
  <circle cx="200" cy="200" r="140" fill="url(#cyanGlow)" opacity="0.82"/>

  <!-- 右上：蓝色圆 -->
  <circle cx="312" cy="200" r="140" fill="url(#blueGlow)" opacity="0.82"/>

  <!-- 下方中间：紫色圆 -->
  <circle cx="256" cy="300" r="140" fill="url(#purpleGlow)" opacity="0.82"/>

  <!-- 中心核心亮点（协调器） -->
  <circle cx="256" cy="240" r="24" fill="white" opacity="0.9"/>
</svg>
